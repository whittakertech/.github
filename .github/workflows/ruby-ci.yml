name: Ruby CI

on:
  workflow_call:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # -------------------------------
      # SQLite (only if Gemfile.lock references it)
      # -------------------------------
      - name: Install SQLite
        run: |
          if grep -q 'sqlite3' Gemfile.lock 2>/dev/null; then
            sudo apt-get update && sudo apt-get install -y sqlite3 libsqlite3-dev
          fi

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.4"
          bundler-cache: true

      # -------------------------------
      # RuboCop (only if config exists)
      # -------------------------------
      - name: RuboCop Linting
        if: hashFiles('.rubocop.yml') != ''
        run: |
          echo "Running RuboCop..."
          bundle exec rubocop

      # -------------------------------
      # RSpec (only if folder exists)
      # -------------------------------
      - name: Run RSpec
        if: hashFiles('spec/**/*.rb') != ''
        run: |
          echo "Running RSpec..."
          bundle exec rspec

      # -------------------------------
      # Minitest (only if folder exists)
      # Note: ensure RSpec didn't already run
      # -------------------------------
      - name: Run Minitest
        if: hashFiles('test/**/*.rb') != '' && hashFiles('spec/**/*.rb') == ''
        run: |
          echo "Running Minitest..."
          bundle exec rake test

      # -------------------------------
      # Rails Test Tasks
      # Only for a Rails engine/app that has neither RSpec nor Minitest —
      # otherwise this duplicates (and can fail on) the suite already run above.
      # -------------------------------
      - name: Run Rails Tests
        if: |
          (hashFiles('config/application.rb') != '' || hashFiles('lib/**/engine.rb') != '') &&
          hashFiles('spec/**/*.rb') == '' &&
          hashFiles('test/**/*.rb') == ''
        run: |
          echo "Detected Rails engine or app. Running Rails test task..."
          bundle exec rake

      # -------------------------------
      # YARD documentation (optional)
      # -------------------------------
      - name: Build YARD Docs
        if: hashFiles('.yardopts') != ''
        run: |
          echo "Building YARD documentation..."
          bundle exec yard doc
