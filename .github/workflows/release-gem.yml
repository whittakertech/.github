name: Release Gem

on:
  workflow_call:

env:
  GEMSPEC: "*.gemspec"

jobs:
  # Deliberately no auto_tag job. Gitea (WhittakerTech-org's source of truth)
  # push-mirrors to GitHub with `git push --mirror`, which prunes any ref
  # on GitHub not present on Gitea. A tag created directly on GitHub (e.g. by
  # an Actions bot) never exists on Gitea, so the very next mirror sync
  # deletes it — which then re-triggers this workflow, which recreates the
  # tag, which tries to re-release an already-published version, which fails
  # at `gem push`, forever, on every future push to master. Tag on Gitea
  # (the source of truth) instead: `git tag vX.Y.Z && git push origin
  # vX.Y.Z` against the Gitea remote. It mirrors down safely since it then
  # genuinely exists at the source, and this job fires normally.
  release:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.4"
          bundler-cache: true

      - name: Resolve gemspec filename
        id: gemspec
        run: |
          FILE=$(ls $GEMSPEC | head -n 1)
          echo "file=$FILE" >> $GITHUB_OUTPUT

      - name: Extract gem metadata
        id: gem
        run: |
          NAME=$(ruby -e "spec = Gem::Specification.load('${{ steps.gemspec.outputs.file }}'); puts spec.name")
          VER=$(ruby -e "spec = Gem::Specification.load('${{ steps.gemspec.outputs.file }}'); puts spec.version")
          FILE="${NAME}-${VER}.gem"

          echo "name=$NAME"  >> $GITHUB_OUTPUT
          echo "version=$VER" >> $GITHUB_OUTPUT
          echo "gemfile=$FILE" >> $GITHUB_OUTPUT

      - name: Build gem
        run: gem build "${{ steps.gemspec.outputs.file }}"

      - name: Configure RubyGems credentials
        run: |
          mkdir -p ~/.gem
          echo -e "---\n:rubygems_api_key: ${RUBYGEMS_API_KEY}" > ~/.gem/credentials
          chmod 0600 ~/.gem/credentials
        env:
          RUBYGEMS_API_KEY: ${{ secrets.RUBYGEMS_API_KEY }}

      - name: Push to RubyGems
        run: gem push "${{ steps.gem.outputs.gemfile }}"

      - name: Extract CHANGELOG section
        id: changelog
        if: hashFiles('CHANGELOG.md') != ''
        run: |
          NOTES=$(awk -v ver="${{ steps.gem.outputs.version }}" '
            $0 ~ "^## \\[" ver "\\]" {found=1; next}
            found && /^## \[/ {exit}
            found {print}
          ' CHANGELOG.md)
          {
            echo "notes<<GHRELEASE_EOF"
            echo "$NOTES"
            echo "GHRELEASE_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v${{ steps.gem.outputs.version }}"
          name: "v${{ steps.gem.outputs.version }}"
          body: ${{ steps.changelog.outputs.notes }}
          generate_release_notes: ${{ steps.changelog.outputs.notes == '' }}
